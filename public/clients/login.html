<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Client Login - Stark Automate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #02a54b;
      --primary-light: #04d861;
      --primary-dark: #017a3a;
      --bg-light: #ffffff;
      --bg-dark: #0f1419;
      --text-light: #1a1a1a;
      --text-dark: #e4e4eb;
      --border-light: #e5e5e5;
      --border-dark: #2a2a3a;
      --surface-light: #f5f5f5;
      --surface-dark: #1a1a24;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--bg-light);
      color: var(--text-light);
      transition: background-color 0.3s, color 0.3s;
    }

    body.dark-mode {
      background-color: var(--bg-dark);
      color: var(--text-dark);
    }

    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(135deg, rgba(2, 165, 75, 0.1) 0%, rgba(2, 165, 75, 0.05) 100%);
    }

    body.dark-mode .login-container {
      background: linear-gradient(135deg, rgba(2, 165, 75, 0.08) 0%, rgba(2, 165, 75, 0.03) 100%);
    }

    .login-box {
      width: 100%;
      max-width: 400px;
      background-color: var(--surface-light);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 4px 16px rgba(2, 165, 75, 0.1);
    }

    body.dark-mode .login-box {
      background-color: var(--surface-dark);
      border-color: var(--border-dark);
      box-shadow: 0 4px 16px rgba(2, 165, 75, 0.15);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .login-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-size: 14px;
      color: #888;
    }

    body.dark-mode .login-subtitle {
      color: #aaa;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border-light);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      background-color: var(--bg-light);
      color: var(--text-light);
      transition: border-color 0.3s;
    }

    body.dark-mode input {
      background-color: var(--bg-dark);
      color: var(--text-dark);
      border-color: var(--border-dark);
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(2, 165, 75, 0.1);
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background-color: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(2, 165, 75, 0.3);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-message {
      color: #dc2626;
      font-size: 14px;
      margin-top: 8px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .theme-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      opacity: 0.6;
      transition: opacity 0.3s;
    }

    .theme-toggle:hover {
      opacity: 1;
    }

    .loading {
      display: none;
    }

    .loading.show {
      display: inline;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle">🌙</button>

  <div class="login-container">
    <div class="login-box">
      <div class="login-header">
        <div class="login-logo">
             <img src="../logo.png" alt="Stark">
        </div>
        <h1 class="login-title">Client Portal</h1>
        <p class="login-subtitle">Manage your campaigns & templates</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required placeholder="you@example.com">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="••••••••">
        </div>

        <div id="errorMessage" class="error-message"></div>

        <button type="submit" class="btn btn-primary">
          <span class="loading" id="spinner">
            <span class="spinner"></span>
          </span>
          <span id="btnText">Sign In</span>
        </button>
      </form>
    </div>
  </div>

  <script>
    // Theme toggle
    const themeToggle = document.getElementById('themeToggle');
    const isDarkMode = localStorage.getItem('darkMode') === 'true';
    if (isDarkMode) document.body.classList.add('dark-mode');

    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
      themeToggle.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
    });

    themeToggle.textContent = isDarkMode ? '☀️' : '🌙';

    // Login form
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('errorMessage');
      const spinner = document.getElementById('spinner');
      const btnText = document.getElementById('btnText');

      errorDiv.classList.remove('show');
      spinner.classList.add('show');
      btnText.textContent = 'Signing in...';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Login failed');
        }

        // Store JWT token
        localStorage.setItem('token', data.token);
        localStorage.setItem('client_id', data.client_id);

        // Redirect to dashboard
        window.location.href = `/clients/${data.client_id}/dashboard`;
      } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.classList.add('show');
        spinner.classList.remove('show');
        btnText.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
